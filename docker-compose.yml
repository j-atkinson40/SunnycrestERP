services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sunnycrest
      POSTGRES_PASSWORD: sunnycrest_dev
      POSTGRES_DB: sunnycrest_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
