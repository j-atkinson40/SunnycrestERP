name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + import check
  # ---------------------------------------------------------------------------
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      SECRET_KEY: ci-test-secret-key-not-for-production
      CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (app loads without errors)
        run: python -c "from app.main import app; print('Backend imports OK')"

      # R-3.1.4: heads check runs BEFORE `alembic upgrade head` so it
      # remains actionable even when migration *content* is broken. The
      # heads check reads alembic version files only — it doesn't need
      # a populated DB. Pre-R-3.1.4 this step ran AFTER the upgrade
      # step, which meant a multi-head situation (e.g. R-3.1.2's
      # r48+r88 collision) was swallowed under whatever upgrade error
      # surfaced first. Reordered so multi-heads fail loud at PR time.
      - name: Verify migration heads
        run: |
          HEAD_COUNT=$(alembic heads | wc -l)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "ERROR: Multiple Alembic heads detected — please merge migrations"
            alembic heads
            echo ""
            echo "Run 'alembic merge -m \"...\" <head1> <head2>' to unify."
            exit 1
          fi
          echo "Single migration head confirmed"

      - name: Run Alembic migrations
        run: alembic upgrade head

  # ---------------------------------------------------------------------------
  # Frontend: typecheck + build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc -b

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com
