# R-1.6 — Playwright runtime-editor validation gates against staging.
#
# Triggers on push to `main` (auto) AND workflow_dispatch (manual).
# Does NOT run on PRs or feature branches — staging is single-tenant
# for `main`. PR-time validation continues via .github/workflows/ci.yml
# (vitest + tsc + build).
#
# Job sequence:
#   1. Install Playwright + cache browser binaries.
#   2. Deploy gate: poll /api/health until `commit` field matches the
#      just-pushed SHA. Without this, fast deploys race the workflow
#      and Playwright runs against pre-R-1.6 staging code (flaky).
#   3. Run the 13 R-1.5 specs at tests/e2e/runtime-editor/.
#   4. Upload Playwright traces + screenshots + HTML report on failure.
#
# Required GitHub Secrets:
#   - STAGING_CI_BOT_EMAIL    (set by ops after running provision_ci_bot.py)
#   - STAGING_CI_BOT_PASSWORD (set by ops after running provision_ci_bot.py)
#
# Workflow timing budget: under 12 minutes total (deploy gate worst-case
# 10 min + spec run 1-2 min). If consistently exceeding, surface in
# CLAUDE.md and revisit.
name: Playwright Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't race back-to-back pushes — last one wins.
concurrency:
  group: playwright-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (runtime-editor) against staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    env:
      STAGING_BACKEND: https://sunnycresterp-staging.up.railway.app
      STAGING_FRONTEND: https://determined-renewal-staging.up.railway.app
      STAGING_CI_BOT_EMAIL: ${{ secrets.STAGING_CI_BOT_EMAIL }}
      STAGING_CI_BOT_PASSWORD: ${{ secrets.STAGING_CI_BOT_PASSWORD }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # R-1.6.3: Build the frontend so spec 11 (bundle-delta) actually
      # runs. Pre-R-1.6.3 the spec hit its `test.skip(!distExists)`
      # guard because no build step ran in CI — the +5% bundle ceiling
      # was a no-op gate. Adds 30-60s to workflow runtime; well within
      # the 12-min budget. Spec 11 now produces a real pass/fail per push.
      - name: Build frontend (gates spec 11 — bundle-delta)
        run: npx vite build

      - name: Deploy gate — staging serves ${{ github.sha }} (backend + frontend)
        # Backend + frontend are SEPARATE Railway services; both must stably
        # serve the pushed SHA before frontend e2e runs — the frontend via its
        # build-stamped /version.json (emitted only by a successful vite build,
        # so a failed build leaves it stale and this gate fails LOUD instead of
        # testing a stale bundle). Requires N consecutive healthy matches (the
        # backend takes >5 min to stabilize post-deploy). Fail-closed: a
        # not-ready surface times out with a surface-specific message, never
        # proceeds. (Replaces the old backend-only poll + bootstrap-fallback
        # that ran tests against stale/erroring services — see deploy-gate.sh.)
        run: bash .github/scripts/deploy-gate.sh --sha "${{ github.sha }}" --backend "$STAGING_BACKEND" --frontend "$STAGING_FRONTEND"

      - name: Run Playwright runtime-editor specs
        run: npx playwright test tests/e2e/runtime-editor/ --project=chromium --reporter=list,html
        env:
          BACKEND_URL: ${{ env.STAGING_BACKEND }}

      # NOTE: the Claude-API e2e specs (real-model generation proofs) moved to
      # their OWN job (`claude-api`, below) so their green verdict reads green
      # at the JOB level, independent of this runtime-editor suite's flakiness
      # (which routinely drags this job red on transient staging 502s). The two
      # jobs run in parallel; neither `needs` the other.

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: frontend/tests/e2e/report
          retention-days: 14

      - name: Upload Playwright traces + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_number }}
          path: |
            frontend/tests/e2e/screenshots
            frontend/test-results
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Claude-API e2e specs — their OWN job (CI hygiene, 2026-06-09).
  #
  # The real-model generation proofs (1a tenant-realm + 1b platform-realm) used
  # to run as a step inside the runtime-editor job, where that suite's routine
  # flakiness (staging 502s / waitFor timeouts) dragged the WHOLE run red even
  # when the Claude-API step reported green. Moving them here makes a green
  # Claude-API verdict read green at the JOB level, fully independent of the
  # runtime-editor job. No `needs:` — the two jobs run in parallel; the
  # runtime-editor job's conclusion can no longer mask this one.
  #
  # This job has its OWN deploy-gate (same poll), its OWN timeout, and the
  # CI-bot secrets the 1b platform-realm spec needs for platform-admin login.
  # ANTHROPIC_API_KEY is configured on STAGING (server-side) — the specs reach
  # it by hitting staging; no CI secret is needed here. No frontend build step:
  # these specs are API-level (request context + page.request), not bundle-
  # dependent, so the build the runtime-editor job needs (spec 11 bundle-delta)
  # is irrelevant here.
  # ---------------------------------------------------------------------------
  claude-api:
    name: Playwright (Claude-API e2e) against staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    env:
      STAGING_BACKEND: https://sunnycresterp-staging.up.railway.app
      STAGING_CI_BOT_EMAIL: ${{ secrets.STAGING_CI_BOT_EMAIL }}
      STAGING_CI_BOT_PASSWORD: ${{ secrets.STAGING_CI_BOT_PASSWORD }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Deploy gate — staging serves ${{ github.sha }} (backend)
        # API-level specs — only the backend must serve the pushed SHA (no
        # frontend dependency). Requires N consecutive healthy matches (the
        # backend takes >5 min to stabilize post-deploy, so a single match
        # could catch it mid-flap → the 502-at-login false reds this fixes).
        # Fail-closed: times out LOUD if the backend never reaches the SHA.
        run: bash .github/scripts/deploy-gate.sh --sha "${{ github.sha }}" --backend "$STAGING_BACKEND"

      - name: Run Playwright Claude-API e2e specs
        # 1a = tenant-realm generation; 1b = platform-realm generation (the
        # realm the Studio editor consumer actually runs in). This is the job's
        # primary step — its result IS the job conclusion. A real failure here
        # (validator-pass assertion) goes red; an unconfigured-AI deploy skips
        # gracefully (ai_status="error" → test.skip), and the service never 5xx.
        run: npx playwright test tests/e2e/workflow-authoring.spec.ts tests/e2e/workflow-authoring-1b.spec.ts --project=chromium --reporter=list,html
        env:
          BACKEND_URL: ${{ env.STAGING_BACKEND }}

      - name: Upload Claude-API report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-api-report-${{ github.run_number }}
          path: frontend/tests/e2e/report
          retention-days: 14

      - name: Upload Claude-API traces + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-api-artifacts-${{ github.run_number }}
          path: |
            frontend/tests/e2e/screenshots
            frontend/test-results
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Maps of Content e2e — its OWN job (MoC Phase 1, 2026-06-23).
  #
  # Witnesses the four deep-link round-trips (a MoC row → the owning builder
  # mounts THAT artifact) against staging. Dedicated job (not folded into
  # claude-api) per the CI-decoupling principle: an independent verdict so MoC
  # flakiness can't mask the Claude-API verdict and vice versa. No `needs:` —
  # runs in parallel with its own deploy-gate. CI-bot secrets for the
  # platform-admin login (loginAsPlatformAdmin); setupPage's PROD_API→staging
  # rewrite is what lets the prod-baked widget + document builder clients
  # resolve under test (the local-preview witness gap they close here).
  # ---------------------------------------------------------------------------
  moc:
    name: Playwright (Maps of Content e2e) against staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    env:
      STAGING_BACKEND: https://sunnycresterp-staging.up.railway.app
      STAGING_FRONTEND: https://determined-renewal-staging.up.railway.app
      STAGING_CI_BOT_EMAIL: ${{ secrets.STAGING_CI_BOT_EMAIL }}
      STAGING_CI_BOT_PASSWORD: ${{ secrets.STAGING_CI_BOT_PASSWORD }}
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Deploy gate — staging serves ${{ github.sha }} (backend + frontend)
        # MoC tests are pure FRONTEND behavior — the failure that motivated this
        # gate was a stale frontend bundle (a failed vite build) the old
        # backend-only gate couldn't see. Both services must stably serve the
        # pushed SHA (frontend via its build-stamped /version.json); N
        # consecutive healthy matches absorb the backend's >5 min stabilization.
        # Fail-closed with surface-specific messages — see deploy-gate.sh.
        run: bash .github/scripts/deploy-gate.sh --sha "${{ github.sha }}" --backend "$STAGING_BACKEND" --frontend "$STAGING_FRONTEND"

      - name: Run Playwright Maps-of-Content e2e specs
        # The four deep-link round-trips + the full home→Manufacturing→click
        # path. This step's result IS the job conclusion.
        run: npx playwright test tests/e2e/maps-of-content.spec.ts --project=chromium --reporter=list,html
        env:
          BACKEND_URL: ${{ env.STAGING_BACKEND }}

      - name: Upload MoC report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moc-report-${{ github.run_number }}
          path: frontend/tests/e2e/report
          retention-days: 14

      - name: Upload MoC traces + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moc-artifacts-${{ github.run_number }}
          path: |
            frontend/tests/e2e/screenshots
            frontend/test-results
          retention-days: 14
