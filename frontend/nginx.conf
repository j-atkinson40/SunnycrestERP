server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML entry point so browsers always get the latest bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # Vite builds JS/CSS with content hashes — cache them forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
