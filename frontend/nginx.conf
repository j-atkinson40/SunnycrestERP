server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite builds JS/CSS with content hashes — cache them forever.
    # Cloudflare-CDN-Cache-Control tells the Cloudflare edge to cache these too.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cloudflare-CDN-Cache-Control "max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached — it contains hashed <script> tags that
    # change on every deploy. Serve with aggressive no-cache directives.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        add_header Surrogate-Control "no-store";
        add_header Pragma "no-cache";
    }

    # Static marketing pages — served directly, not through React Router
    location = /how-it-works {
        rewrite ^ /how-it-works.html last;
    }

    # All other requests fall back to index.html (SPA routing).
    # no-store prevents browser and CDN caching of HTML responses.
    # Cloudflare-CDN-Cache-Control ensures Cloudflare respects no-store even
    # when a page rule or default behaviour would otherwise cache the response.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
